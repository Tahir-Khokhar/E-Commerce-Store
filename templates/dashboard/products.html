{% extends 'base.html' %}
{% block title %}Products{% endblock %}
{% block content %}
<h2 class="mb-3">Products</h2>
<table class="table table-striped">
    <thead><tr><th>Name</th><th>SKU</th><th>Category</th><th>Price</th><th>Stock</th><th>Active</th></tr></thead>
    <tbody>
        {% for p in products %}
        <tr>
            <td>{{ p.name }}</td><td>{{ p.sku }}</td><td>{{ p.category }}</td>
            <td>${{ p.price }}</td><td>{{ p.stock }}</td><td>{% if p.is_active %}Yes{% else %}No{% endif %}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
