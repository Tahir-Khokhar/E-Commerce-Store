{% extends 'base.html' %}
{% block title %}Orders{% endblock %}
{% block content %}
<h2 class="mb-3">Orders</h2>
<table class="table table-striped">
    <thead><tr><th>Order</th><th>Customer</th><th>Date</th><th>Total</th><th>Status</th></tr></thead>
    <tbody>
        {% for o in orders %}
        <tr>
            <td><a href="{% url 'order_detail' o.id %}">{{ o.order_number }}</a></td>
            <td>{{ o.user }}</td><td>{{ o.created_at|date }}</td><td>${{ o.total }}</td><td>{{ o.get_status_display }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
