{% extends 'base.html' %}
{% block title %}Inventory{% endblock %}
{% block content %}
<h2 class="mb-3">Inventory movements</h2>
<table class="table table-sm">
    <thead><tr><th>Date</th><th>Product</th><th>Type</th><th>Change</th><th>Note</th></tr></thead>
    <tbody>
        {% for m in movements %}
        <tr><td>{{ m.created_at|date }}</td><td>{{ m.product }}</td><td>{{ m.transaction_type }}</td><td>{{ m.quantity_change }}</td><td>{{ m.note }}</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
