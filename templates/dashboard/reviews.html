{% extends 'base.html' %}
{% block title %}Reviews{% endblock %}
{% block content %}
<h2 class="mb-3">Reviews</h2>
<table class="table table-striped">
    <thead><tr><th>Product</th><th>User</th><th>Rating</th><th>Status</th><th>Title</th></tr></thead>
    <tbody>
        {% for r in reviews %}
        <tr><td>{{ r.product }}</td><td>{{ r.user }}</td><td>{{ r.rating }}</td><td>{{ r.get_status_display }}</td><td>{{ r.title }}</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
